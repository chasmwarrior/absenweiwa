version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/sqlite.db
      - JWT_SECRET=super_secret_key_change_this
    volumes:
      - ./data:/app/data
    restart: always

volumes:
  data:
